# SAM Ingest — Railway cron worker.
# Runs at 11:00 UTC = 06:00 CDT (30 min before audit-ai's 06:30 CDT cron) so
# any solicitations posted overnight land in pending_audits before the
# auditor wakes up.
#
# Service is configured with Root Directory = /  (repo root) and Watch Paths
# scoped to agents/sam-ingest/** so the deploy is monorepo-friendly.

[deploy]
startCommand = "npx tsx agents/sam-ingest/index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
cronSchedule = "*/2 * * * *"  # TEMP for first-run smoke test — revert to 0 11 * * * after first run logs
