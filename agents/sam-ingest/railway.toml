# SAM Ingest — Railway cron worker.
# Runs at 11:00 UTC = 06:00 CDT (30 min before audit-ai's 06:30 CDT cron) so
# any solicitations posted overnight land in pending_audits before the
# auditor wakes up.
#
# Service is configured with Root Directory = agents/sam-ingest (set in Railway
# dashboard May 4 2026 · Sprint 2.2.0). Watch Paths scoped to agents/sam-ingest/**.

[build]
# Empty build command — agent-scoped nixpacks.toml in this directory disables
# the build phase so Nixpacks won't try `next build`.
buildCommand = ""

[deploy]
# Path is relative to /app (= agents/sam-ingest/ post-rootDirectory-fix). The
# previous "npx tsx agents/sam-ingest/index.ts" would have caused
# ERR_MODULE_NOT_FOUND on next cron tick (same bug Audit-AI hit and surfaced).
startCommand = "npx tsx index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
cronSchedule = "0 11 * * *"  # 11:00 UTC = 06:00 CDT
