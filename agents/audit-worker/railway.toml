# FA-116 — audit-worker: resident Railway service for user-enqueued audits.
#
# UNLIKE audit-ai/sam-ingest, this service MUST use Root Directory = / —
# worker.ts imports src/lib/audit-executor (and through it the full V1+V2
# engine), so the container needs the whole repo tree. Point the service's
# "Config as code" path at agents/audit-worker/railway.toml so this file
# applies; the repo-root nixpacks.toml (install-only, no `next build`)
# handles the build phase.
#
# Required service env (besides the shared Supabase/Anthropic/SAM vars):
#   NIXPACKS_NODE_VERSION=22   — supabase-js realtime needs native WebSocket
#                                (ws is not a repo-root dependency)
#   NPM_CONFIG_PRODUCTION=false — tsx/dotenv/pdf-parse live in root
#                                 devDependencies and are needed at runtime
#
# Resident loop (no cronSchedule) — restart ALWAYS so redeploys/crashes
# resume claiming; the in-loop stale sweep recovers rows orphaned mid-audit.

[build]
buildCommand = ""
# 2026-06-19 root-cause: the Opus engine edit (src/lib/audit-engine.ts) did NOT
# auto-deploy because this service had no src/lib watch path — a stale pre-Opus
# image kept claiming audits and ran Sonnet. Watch the whole tree the worker
# bundles so ANY engine/executor/judgment change triggers a rebuild. Broad by
# design: deploying more is safe; the prior gap shipped a stale model silently.
watchPatterns = ["src/**", "agents/audit-worker/**", "package.json", "package-lock.json", "nixpacks.toml", "tsconfig.json"]

[deploy]
# FA-149/FA-147 production finding (deploy 8999d4b4 replacing e81c53c6):
# "npx tsx …" runs as sh -c → npm → sh -c → tsx → node, and the npm/sh layers
# do NOT forward SIGTERM to the node process holding the drain handler — the
# old container died with "npm error signal SIGTERM" and no drain log, exactly
# the claim-stranding FA-149 exists to prevent. `exec` replaces Railway's
# sh -c with the tsx CLI (a node script: .bin/tsx shebang is /usr/bin/env
# node), and tsx relays signals to its child — so SIGTERM reaches
# process.once("SIGTERM") in worker.ts.
startCommand = "exec node_modules/.bin/tsx agents/audit-worker/index.ts"
restartPolicyType = "ALWAYS"
