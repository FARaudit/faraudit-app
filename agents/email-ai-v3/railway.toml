[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Cron schedule set via Railway dashboard or `railway variables` — */30 * * * *
# Required env vars (see .env.example for full list):
#   GMAIL_USER, GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET, GMAIL_REFRESH_TOKEN
#   ANTHROPIC_API_KEY, ANTHROPIC_MODEL
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   EMAIL_AI_ENABLED (kill switch — must be 'true' to run)
