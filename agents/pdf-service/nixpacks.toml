# PDF Service Nixpacks config — active because Railway service config
# has rootDirectory = agents/pdf-service, so this file is at the build
# context root. Locks the Node version + disables the build phase.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --omit=dev || npm install --omit=dev"]

[phases.build]
cmds = []

[start]
cmd = "npx tsx index.ts"
