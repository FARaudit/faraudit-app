# PDF Service Nixpacks config — active because Railway service config
# has rootDirectory = agents/pdf-service. Installs Node 22 + the system
# shared libs headless Chromium needs on a vanilla Debian container
# (@sparticuz/chromium assumes the AWS Lambda runtime has these; Railway
# does not).
#
# The apt list mirrors what puppeteer's Debian-Bookworm install docs
# call out, minus a few X11 libs we don't need for headless render.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libxfixes3",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
  "fonts-liberation"
]

[phases.install]
cmds = ["npm ci --omit=dev || npm install --omit=dev"]

[phases.build]
cmds = []

[start]
cmd = "npx tsx index.ts"
