# Recompete AI — Railway cron worker.
# Runs daily at 12:00 UTC = 07:00 CDT (after audit-ai 06:30 CDT cron).
# Configure Root Directory = agents/recompete-ai in Railway dashboard.

[deploy]
startCommand = "npx tsx index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
cronSchedule = "0 12 * * *"
