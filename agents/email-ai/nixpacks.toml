# Nixpacks override — DO NOT auto-run any build. This worker is plain Node;
# Railway should only install deps and execute the start command.
# Belt-and-suspenders for the same misconfig pattern that broke Email AI when
# Railway Root Directory was set to / and Nixpacks ran the parent Next.js build.

providers = ["node"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = []

[start]
cmd = "node index.js"
