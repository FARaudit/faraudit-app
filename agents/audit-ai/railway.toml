# Audit AI — Railway cron worker.
# Service is configured with Root Directory = agents/audit-ai (set in Railway
# dashboard May 4 2026 · Sprint 2.2.0). Watch Paths scoped to agents/audit-ai/**
# + src/lib/audit-engine.ts + src/lib/sam.ts so the worker imports the upgraded
# engine directly from src/lib/ instead of duplicating it.

[build]
# Empty build command — agent-scoped nixpacks.toml in this directory disables
# the build phase so Nixpacks won't try `next build`.
buildCommand = ""

[deploy]
# Path is relative to /app (= agents/audit-ai/ post-rootDirectory-fix). The
# previous "npx tsx agents/audit-ai/index.ts" caused ERR_MODULE_NOT_FOUND
# because Railway's container /app already IS agents/audit-ai/ — the prefix
# resolved to /app/agents/audit-ai/index.ts which doesn't exist.
startCommand = "npx tsx index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
cronSchedule = "30 11 * * *"  # 11:30 UTC = 06:30 CDT (Railway crons run in UTC)
