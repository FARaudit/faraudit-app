# Audit AI — Railway cron worker.
# Service is configured with Root Directory = /  (repo root) and Watch Paths
# scoped to agents/audit-ai/** + src/lib/audit-engine.ts + src/lib/sam.ts so
# the deploy is monorepo-friendly: the worker imports the upgraded engine
# directly from src/lib/ instead of duplicating it.

[build]
# Empty build command — repo-root nixpacks.toml also disables the build
# phase so Nixpacks won't try `next build` even though Root Directory = /.
buildCommand = ""

[deploy]
startCommand = "npx tsx agents/audit-ai/index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
cronSchedule = "30 11 * * *"  # 11:30 UTC = 06:30 CDT (Railway crons run in UTC)
